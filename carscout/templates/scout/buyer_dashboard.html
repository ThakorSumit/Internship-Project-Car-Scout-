{% load static %}

<head>
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
{% block content %}
<aside class="admin-sidebar">
    <div class="sidebar-brand">
        <div class="logo-brand">Car<span>Scout</span></div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">
            <span class="section-label">Main Menu</span>
            <a href="#" class="nav-item active">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-heart"></i> Saved Cars
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-search"></i> Saved Searches
            </a>
        </div>

        <div class="nav-section">
            <span class="section-label">Activity</span>
            <a href="#" class="nav-item">
                <i class="fas fa-calendar-check"></i> My Appointments
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-comments"></i> Inquiries
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-file-contract"></i> Offers Info
            </a>
        </div>

        <div class="nav-section">
            <span class="section-label">Account</span>
            <a href="#" class="nav-item">
                <i class="fas fa-user-circle"></i> My Profile
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i> Settings
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <a href="#" class="logout-link">
            <i class="fas fa-sign-out-alt"></i> Log Out
        </a>
    </div>
</aside>

<main class="dashboard-main">
    <header class="dashboard-header">
        <h1>Welcome back, {{ user.username }}</h1>
        <p>Manage your car buying journey</p>
    </header>

    <div class="dashboard-grid">
        <!-- Dashboard summary cards or recent activity can go here -->
    </div>
</main>
{% endblock content %}
