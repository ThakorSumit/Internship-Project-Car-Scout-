<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

    .admin-navbar {
        background: #070c1a;
        border-bottom: 1px solid rgba(218, 165, 32, 0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
        height: 68px;
        display: flex;
        align-items: center;
    }

    .admin-nav-container {
        width: 100%;
        padding: 0 40px;
        display: flex;
        align-items: center;
        gap: 28px;
    }

    /* ── BRAND ── */
    .admin-nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        text-decoration: none;
    }

    .admin-nav-logo {
        font-family: 'Syne', sans-serif;
        font-size: 1.2rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: -0.5px;
    }

    .admin-nav-logo span {
        color: #daa520;
    }

    .admin-nav-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(218, 165, 32, 0.08);
        border: 1px solid rgba(218, 165, 32, 0.2);
        color: #daa520;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: 'JetBrains Mono', monospace;
    }

    .admin-nav-pill::before {
        content: '';
        width: 5px;
        height: 5px;
        background: #22c55e;
        border-radius: 50%;
        animation: nav-blink 2s infinite;
    }

    @keyframes nav-blink {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.2;
        }
    }

    /* ── NAV LINKS ── */
    .admin-nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: auto;
    }

    .admin-nav-link {
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 7px;
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }

    .admin-nav-link:hover {
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.85);
    }

    .admin-nav-link.active {
        color: #daa520;
        background: rgba(218, 165, 32, 0.08);
    }

    /* ── ACTIONS ── */
    .admin-nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        padding-left: 20px;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
    }

    .admin-nav-user {
        font-size: 0.78rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.35);
        font-family: 'JetBrains Mono', monospace;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .admin-nav-logout {
        background: rgba(239, 68, 68, 0.08);
        color: rgba(239, 68, 68, 0.6);
        border: 1px solid rgba(239, 68, 68, 0.15);
        padding: 7px 16px;
        border-radius: 7px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .admin-nav-logout:hover {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.3);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
        .admin-nav-links {
            display: none;
        }

        .admin-nav-container {
            padding: 0 16px;
            gap: 12px;
        }

        .admin-nav-actions {
            padding-left: 12px;
        }
    }
</style>

<nav class="admin-navbar">
    <div class="admin-nav-container">

        <a href="/scout/admin/" class="admin-nav-brand">
            <span class="admin-nav-logo">CAR<span>SCOUT</span></span>
            <span class="admin-nav-pill">ADMIN</span>
        </a>

        <div class="admin-nav-links">
            <a href="/scout/admin" class="admin-nav-link active">Dashboard</a>
            <a href="/django-admin/scout/listing/" class="admin-nav-link">Listings</a>
            <a href="/django-admin/core/user/" class="admin-nav-link">Users</a>
            <a href="/django-admin/scout/report/" class="admin-nav-link">AI Reports</a>
            <a href="/django-admin/" class="admin-nav-link">Django Admin</a>
        </div>

        <div class="admin-nav-actions">
            <span class="admin-nav-user">{{ request.user.email }}</span>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="admin-nav-logout">→ Logout</button>
            </form>
        </div>

    </div>
</nav>
