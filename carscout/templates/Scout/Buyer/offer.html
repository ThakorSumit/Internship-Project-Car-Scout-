{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container"
    style="max-width: 600px; margin: 50px auto; padding: 30px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px; font-family: 'Outfit', sans-serif;">Make an
        Offer</h2>
    {% if listing %}
    <p style="text-align: center; color: #ccc; margin-bottom: 20px;">for {{ listing.vehicle.year }} {{
        listing.vehicle.company }} {{ listing.vehicle.model }}</p>
    <p style="text-align: center; color: #d4af37; font-size: 1.2em; font-weight: bold; margin-bottom: 20px;">Asking
        Price: ${{ listing.price }}</p>
    {% endif %}
    <form action="" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" class="btn btn-primary"
                style="background: linear-gradient(135deg, #d4af37, #f3e5ab); border: none; color: #000; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.2s ease;">Submit
                Offer</button>
        </div>
    </form>
</div>
{% endblock %}
