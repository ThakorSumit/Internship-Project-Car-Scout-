<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

    .buyer-navbar {
        background: #070c1a;
        border-bottom: 1px solid rgba(218, 165, 32, 0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
        height: 68px;
        display: flex;
        align-items: center;
    }

    .buyer-nav-container {
        width: 100%;
        padding: 0 40px;
        display: flex;
        align-items: center;
        gap: 28px;
    }

    /* ── LOGO ── */
    .buyer-nav-logo {
        font-family: 'Syne', sans-serif;
        font-size: 1.2rem;
        font-weight: 900;
        color: #fff;
        text-decoration: none;
        letter-spacing: -0.5px;
        flex-shrink: 0;
    }

    .buyer-nav-logo span {
        color: #daa520;
    }

    /* ── SEARCH ── */
    .buyer-nav-search {
        flex: 1;
        max-width: 400px;
    }

    .buyer-nav-search form {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        overflow: hidden;
        transition: border-color 0.2s, background 0.2s;
    }

    .buyer-nav-search form:focus-within {
        border-color: rgba(218, 165, 32, 0.4);
        background: rgba(255, 255, 255, 0.06);
    }

    .buyer-nav-search input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 9px 14px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.8);
        outline: none;
    }

    .buyer-nav-search input::placeholder {
        color: rgba(255, 255, 255, 0.2);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
    }

    .buyer-nav-search button {
        background: none;
        border: none;
        padding: 9px 14px;
        cursor: pointer;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.25);
        transition: color 0.2s;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
    }

    .buyer-nav-search button:hover {
        color: #daa520;
    }

    /* ── NAV LINKS ── */
    .buyer-nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: auto;
    }

    .buyer-nav-link {
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 7px;
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }

    .buyer-nav-link:hover {
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.85);
    }

    .buyer-nav-link.active {
        color: #daa520;
        background: rgba(218, 165, 32, 0.08);
    }

    /* ── ACTIONS ── */
    .buyer-nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        padding-left: 20px;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
    }

    .buyer-nav-user {
        font-size: 0.82rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        font-family: 'JetBrains Mono', monospace;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .buyer-nav-logout {
        background: rgba(239, 68, 68, 0.08);
        color: rgba(239, 68, 68, 0.6);
        border: 1px solid rgba(239, 68, 68, 0.15);
        padding: 7px 16px;
        border-radius: 7px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 0.2px;
    }

    .buyer-nav-logout:hover {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.3);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {

        .buyer-nav-search,
        .buyer-nav-links {
            display: none;
        }

        .buyer-nav-container {
            padding: 0 16px;
            gap: 12px;
        }

        .buyer-nav-actions {
            padding-left: 12px;
        }
    }
</style>

<nav class="buyer-navbar">
    <div class="buyer-nav-container">

        <a href="{% url 'buyer_dashboard' %}" class="buyer-nav-logo">
            CAR<span>SCOUT</span>
        </a>

        <div class="buyer-nav-search">
            <form method="GET" action="{% url 'browse_listings' %}">
                <input type="text" name="q" placeholder="Search make, model, VIN...">
                <button type="submit">🔍</button>
            </form>
        </div>

        <div class="buyer-nav-links">
            <a href="{% url 'buyer_dashboard' %}" class="buyer-nav-link">Dashboard</a>
            <a href="{% url 'browse_listings' %}" class="buyer-nav-link">Browse</a>
            <a href="{% url 'buyer_test_drives' %}" class="buyer-nav-link">Test Drives</a>
            <a href="{% url 'buyer_offers' %}" class="buyer-nav-link">My Offers</a>
        </div>

        <div class="buyer-nav-actions">
            <span class="buyer-nav-user">{{ request.user.name }}</span>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="buyer-nav-logout">Logout</button>
            </form>
        </div>

    </div>
</nav>
