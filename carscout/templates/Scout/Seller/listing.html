{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container"
    style="max-width: 600px; margin: 50px auto; padding: 30px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px; font-family: 'Outfit', sans-serif;">Create
        Listing</h2>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" class="btn btn-primary"
                style="background: linear-gradient(135deg, #d4af37, #f3e5ab); border: none; color: #000; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.2s ease;">Create
                Listing</button>
        </div>
    </form>
</div>
{% endblock %}
