<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

    .seller-navbar {
        background: #070c1a;
        border-bottom: 1px solid rgba(218, 165, 32, 0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
        height: 68px;
        display: flex;
        align-items: center;
    }

    .seller-nav-container {
        width: 100%;
        padding: 0 40px;
        display: flex;
        align-items: center;
        gap: 28px;
    }

    /* ── BRAND ── */
    .seller-nav-logo {
        font-family: 'Syne', sans-serif;
        font-size: 1.2rem;
        font-weight: 900;
        color: #fff;
        text-decoration: none;
        letter-spacing: -0.5px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .seller-nav-logo span {
        color: #daa520;
    }

    .seller-nav-logo small {
        font-size: 0.6rem;
        font-weight: 700;
        color: #daa520;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: 1px solid rgba(218, 165, 32, 0.2);
        background: rgba(218, 165, 32, 0.08);
        padding: 3px 8px;
        border-radius: 20px;
        font-family: 'JetBrains Mono', monospace;
    }

    /* ── NAV LINKS ── */
    .seller-nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: auto;
    }

    .seller-nav-link {
        display: flex;
        align-items: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 7px;
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }

    .seller-nav-link:hover {
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.85);
    }

    .seller-nav-link.active {
        color: #daa520;
        background: rgba(218, 165, 32, 0.08);
    }

    .snl-icon {
        font-size: 0.85rem;
    }

    /* ── RIGHT SECTION ── */
    .seller-nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        padding-left: 20px;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
    }

    .seller-nav-user {
        font-size: 0.78rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.35);
        font-family: 'JetBrains Mono', monospace;
        max-width: 130px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .seller-nav-list-btn {
        background: #daa520;
        color: #05080f;
        text-decoration: none;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 0.8rem;
        padding: 8px 16px;
        border-radius: 7px;
        transition: all 0.2s ease;
        white-space: nowrap;
        letter-spacing: 0.2px;
    }

    .seller-nav-list-btn:hover {
        background: #c49a18;
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(218, 165, 32, 0.3);
    }

    .seller-nav-logout {
        background: rgba(239, 68, 68, 0.08);
        color: rgba(239, 68, 68, 0.6);
        border: 1px solid rgba(239, 68, 68, 0.15);
        padding: 7px 16px;
        border-radius: 7px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .seller-nav-logout:hover {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.3);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {

        .seller-nav-links,
        .seller-nav-user {
            display: none;
        }

        .seller-nav-container {
            padding: 0 16px;
            gap: 12px;
        }

        .seller-nav-right {
            padding-left: 12px;
        }
    }
</style>

<nav class="seller-navbar">
    <div class="seller-nav-container">

        <a href="{% url 'seller_dashboard' %}" class="seller-nav-logo">
            CAR<span>SCOUT</span>
            <small>SELLER</small>
        </a>

        <nav class="seller-nav-links">
            <a href="{% url 'seller_dashboard' %}" class="seller-nav-link active">
                <span class="snl-icon">▦</span> Inventory
            </a>
            <a href="{% url 'seller_offers' %}" class="seller-nav-link">
                <span class="snl-icon">🤝</span> Offers
            </a>
            <a href="{% url 'seller_inbox' %}" class="seller-nav-link">
                <span class="snl-icon">✉</span> Messages
            </a>
            <a href="{% url 'seller_test_drives' %}" class="seller-nav-link">
                <span class="snl-icon">◈</span> Test Drives
            </a>
        </nav>

        <div class="seller-nav-right">
            <span class="seller-nav-user">{{ request.user.name }}</span>
            <a href="{% url 'add_listing' %}" class="seller-nav-list-btn">+ List Car</a>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="seller-nav-logout">Logout</button>
            </form>
        </div>

    </div>
</nav>
