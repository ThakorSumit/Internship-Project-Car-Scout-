{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/user/seller.css' %}">
{% endblock %}

{% block content %}
<div class="confirm-delete-page">
    <div class="confirm-delete-card">
        <div class="cd-icon">🗑️</div>
        <h2 class="cd-title">Delete Listing?</h2>
        <p class="cd-body">
            This will permanently delete the listing for <strong>{{ listing.vehicle }}</strong> and all associated data.
            This cannot be undone.
        </p>
        <div class="cd-actions">
            <a href="{% url 'seller_dashboard' %}" class="btn-cd-cancel">Cancel</a>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn-cd-confirm">Yes, Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
